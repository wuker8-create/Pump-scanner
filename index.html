<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pump Scanner">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  <title>Pump Scanner</title>
  <style>
    :root {
      --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;
      --border:rgba(255,255,255,0.07);--text:#f0f0f5;--muted:#6b6b80;
      --green:#22c77a;--green-dim:rgba(34,199,122,0.12);
      --amber:#f0a030;--amber-dim:rgba(240,160,48,0.15);
      --red:#e84545;--red-dim:rgba(232,69,69,0.10);
      --blue:#4f8ef7;--blue-dim:rgba(79,142,247,0.12);
      --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);
      --orange:#fb923c;--orange-dim:rgba(251,146,60,0.12);
      --radius:12px;--radius-sm:8px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text',system-ui,sans-serif;}
    .app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;padding:env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,20px);}

    .header{padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between;}
    .header-left h1{font-size:22px;font-weight:700;letter-spacing:-0.5px;}
    .header-left p{font-size:12px;color:var(--muted);margin-top:2px;}
    .status-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);transition:all 0.3s;}
    .status-dot.active{background:var(--orange);box-shadow:0 0 8px var(--orange);animation:blink 2s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

    /* Score legend */
    .legend{display:flex;gap:6px;padding:0 16px 14px;flex-wrap:wrap;}
    .leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
    .leg-dot{width:8px;height:8px;border-radius:50%;}

    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 16px 14px;}
    .stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;}
    .stat-val{font-size:20px;font-weight:700;line-height:1;}
    .stat-label{font-size:10px;color:var(--muted);margin-top:3px;}
    .stat-val.orange{color:var(--orange);}
    .stat-val.green{color:var(--green);}
    .stat-val.amber{color:var(--amber);}

    .section{padding:0 16px 14px;}
    .section-title{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;}
    .params{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .param{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;display:flex;flex-direction:column;gap:4px;}
    .param label{font-size:11px;color:var(--muted);}
    .param input{background:transparent;border:none;color:var(--text);font-size:16px;font-weight:600;width:100%;outline:none;-webkit-appearance:none;}

    /* Filter row */
    .filter-wrap{padding:0 16px 14px;}
    .filter-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;}
    .filter-tabs{display:flex;gap:6px;flex-wrap:wrap;}
    .ftab{padding:7px 14px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
    .ftab.active{background:var(--orange-dim);color:var(--orange);border-color:rgba(251,146,60,0.4);}
    .topn-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
    .topn-label{font-size:12px;color:var(--muted);}
    .topn-select{background:var(--surface);border:0.5px solid var(--border);color:var(--text);font-size:13px;font-weight:600;padding:5px 10px;border-radius:var(--radius-sm);outline:none;}

    .btn-row{display:flex;gap:8px;padding:0 16px 14px;}
    .btn{flex:1;padding:14px;border-radius:var(--radius);border:none;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.15s,transform 0.1s;-webkit-tap-highlight-color:transparent;}
    .btn:active{transform:scale(0.97);}
    .btn-start{background:var(--orange);color:#000;}
    .btn-stop{background:var(--red-dim);color:var(--red);border:0.5px solid var(--red);}
    .btn-notify{background:var(--blue-dim);color:var(--blue);border:0.5px solid rgba(79,142,247,0.3);flex:0 0 auto;padding:14px 16px;font-size:16px;}
    .btn-notify.granted{background:var(--green-dim);color:var(--green);border-color:rgba(34,199,122,0.3);}

    .divider{height:0.5px;background:var(--border);margin:0 16px 14px;}
    .progress-bar{height:2px;background:var(--surface2);border-radius:2px;margin:0 16px 14px;overflow:hidden;}
    .progress-fill{height:100%;background:var(--orange);border-radius:2px;width:0%;transition:width 0.3s;}

    /* Alert cards */
    .alerts-wrap{padding:0 16px;}
    .alerts-list{display:flex;flex-direction:column;gap:8px;max-height:50vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}

    .alert-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;animation:slideIn 0.3s ease;}
    .alert-card.s3{border-left:3px solid var(--orange);}
    .alert-card.s2{border-left:3px solid var(--amber);}
    .alert-card.s1{border-left:3px solid var(--muted);}
    @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

    .card-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .card-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .card-icon.s3{background:var(--orange-dim);}
    .card-icon.s2{background:var(--amber-dim);}
    .card-icon.s1{background:var(--surface2);}
    .card-name{font-size:15px;font-weight:700;flex:1;}
    .card-score{font-size:12px;font-weight:700;padding:3px 8px;border-radius:20px;}
    .card-score.s3{background:var(--orange-dim);color:var(--orange);}
    .card-score.s2{background:var(--amber-dim);color:var(--amber);}
    .card-score.s1{background:var(--surface2);color:var(--muted);}
    .card-time{font-size:11px;color:var(--muted);}

    /* Signal bars */
    .signals{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
    .sig{background:var(--surface2);border-radius:var(--radius-sm);padding:7px 8px;text-align:center;}
    .sig.on{background:var(--orange-dim);border:0.5px solid rgba(251,146,60,0.3);}
    .sig.on.vol{background:var(--green-dim);border-color:rgba(34,199,122,0.3);}
    .sig.on.squeeze{background:var(--purple-dim);border-color:rgba(167,139,250,0.3);}
    .sig-icon{font-size:14px;}
    .sig-label{font-size:10px;color:var(--muted);margin-top:2px;}
    .sig.on .sig-label{color:var(--text);}
    .sig-val{font-size:11px;font-weight:600;color:var(--muted);margin-top:1px;}
    .sig.on.vol .sig-val{color:var(--green);}
    .sig.on.squeeze .sig-val{color:var(--purple);}
    .sig.on .sig-val{color:var(--orange);}

    .empty{text-align:center;padding:28px 20px;color:var(--muted);font-size:13px;line-height:1.6;}
    .empty-icon{font-size:32px;margin-bottom:10px;}

    .scan-info{font-size:11px;color:var(--muted);text-align:right;padding:0 16px 6px;}
    .log-section{padding:0 16px 20px;}
    .log-box{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;max-height:70px;overflow-y:auto;}
    .log-line{font-size:11px;color:var(--muted);font-family:'SF Mono',monospace;line-height:1.7;}
    .log-line.hi{color:var(--orange);}
    .log-line.warn{color:var(--amber);}
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>🚀 Pump Scanner</h1>
      <p>Bybit · 15m · Сжатие + Объём</p>
    </div>
    <div class="status-dot" id="dot"></div>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--orange)"></div>3 сигнала — горячо</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--amber)"></div>2 сигнала — тепло</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--muted)"></div>1 сигнал</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="st-total">0</div><div class="stat-label">Монет</div></div>
    <div class="stat"><div class="stat-val orange" id="st-hot">0</div><div class="stat-label">Горячих</div></div>
    <div class="stat"><div class="stat-val amber" id="st-alerts">0</div><div class="stat-label">Алертов</div></div>
    <div class="stat"><div class="stat-val" id="st-scan" style="font-size:13px;padding-top:4px;">—</div><div class="stat-label">Скан</div></div>
  </div>

  <div class="filter-wrap">
    <div class="filter-label">Список монет</div>
    <div class="filter-tabs">
      <button class="ftab active" onclick="setMode('volume',this)">💹 Топ объёма</button>
      <button class="ftab" onclick="setMode('gainers',this)">🚀 Топ роста</button>
      <button class="ftab" onclick="setMode('fixed',this)">📋 Фикс</button>
    </div>
    <div class="topn-row">
      <span class="topn-label">Монет:</span>
      <select class="topn-select" id="topn-select">
        <option value="30">30</option>
        <option value="50" selected>50</option>
        <option value="80">80</option>
        <option value="100">100</option>
      </select>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Параметры сигналов</div>
    <div class="params">
      <div class="param">
        <label>BB Squeeze % (сжатие)</label>
        <input type="number" id="p-squeeze" value="30" inputmode="numeric">
      </div>
      <div class="param">
        <label>Объём × средний</label>
        <input type="number" id="p-vol" value="2" step="0.5" inputmode="decimal">
      </div>
      <div class="param">
        <label>Период BB</label>
        <input type="number" id="p-bb" value="20" inputmode="numeric">
      </div>
      <div class="param">
        <label>Мин. сигналов</label>
        <input type="number" id="p-minsig" value="2" min="1" max="3" inputmode="numeric">
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-start" id="main-btn" onclick="toggleScanner()">▶ Запустить</button>
    <button class="btn btn-notify" id="notif-btn" onclick="requestNotify()">🔔</button>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="divider"></div>

  <div class="alerts-wrap">
    <div class="section-title" style="padding:0 0 10px;">Сигналы</div>
    <div class="alerts-list" id="alerts-list">
      <div class="empty">
        <div class="empty-icon">🔍</div>
        Запусти сканнер — найдёт монеты перед пампом:<br>сжатие BB + всплеск объёма + рост давления покупателей
      </div>
    </div>
  </div>

  <div class="scan-info" id="scan-info"></div>

  <div class="log-section">
    <div class="log-box" id="log-box"></div>
  </div>
</div>

<script>
const FIXED_COINS = [
  'BTCUSDT','ETHUSDT','SOLUSDT','XRPUSDT','BNBUSDT','DOGEUSDT','ADAUSDT','TRXUSDT',
  'AVAXUSDT','LINKUSDT','DOTUSDT','MATICUSDT','LTCUSDT','SHIBUSDT','UNIUSDT','ATOMUSDT',
  'ETCUSDT','XLMUSDT','NEARUSDT','ALGOUSDT','FILUSDT','ICPUSDT','APTUSDT','ARBUSDT',
  'OPUSDT','INJUSDT','RUNEUSDT','SUIUSDT','SEIUSDT','TIAUSDT','WIFUSDT','JUPUSDT',
  'PENDLEUSDT','PYTHUSDT','STXUSDT','AAVEUSDT','MKRUSDT','LDOUSDT','FETUSDT','RENDERUSDT',
  'WLDUSDT','TONUSDT','HBARUSDT','VETUSDT','GRTUSDT','FTMUSDT','SANDUSDT','AXSUSDT','APEUSDT','IMXUSDT'
];

let currentMode = 'volume';
let running = false;
let timer = null;
let alertCount = 0;
let scanBatch = 0;
let prevAlerted = new Set();

function log(msg, cls='') {
  const t = new Date().toLocaleTimeString('ru-RU');
  const line = document.createElement('div');
  line.className = 'log-line' + (cls?' '+cls:'');
  line.textContent = `[${t}] ${msg}`;
  const box = document.getElementById('log-box');
  box.insertBefore(line, box.firstChild);
  while(box.children.length > 30) box.removeChild(box.lastChild);
}

function setMode(mode, el) {
  currentMode = mode;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

async function fetchTopCoins() {
  const topN = +document.getElementById('topn-select').value || 50;
  try {
    const r = await fetch('https://api.bybit.com/v5/market/tickers?category=spot');
    const data = await r.json();
    let tickers = data.result.list.filter(t =>
      t.symbol.endsWith('USDT') &&
      !t.symbol.includes('USDC') &&
      parseFloat(t.turnover24h) > 300000
    );
    if (currentMode === 'gainers') {
      tickers.sort((a,b) => parseFloat(b.price24hPcnt)-parseFloat(a.price24hPcnt));
    } else {
      tickers.sort((a,b) => parseFloat(b.turnover24h)-parseFloat(a.turnover24h));
    }
    return tickers.slice(0, topN).map(t => t.symbol);
  } catch(e) {
    log('Ошибка тикеров — фикс список', 'warn');
    return FIXED_COINS.slice(0, topN);
  }
}

// Fetch candles with volume
async function fetchCandles(symbol) {
  const url = `https://api.bybit.com/v5/market/kline?category=spot&symbol=${symbol}&interval=15&limit=80`;
  const r = await fetch(url);
  const data = await r.json();
  if (data.retCode !== 0) throw new Error(data.retMsg);
  // [time, open, high, low, close, volume, turnover] newest first → reverse
  return data.result.list.reverse().map(c => ({
    o: parseFloat(c[1]),
    h: parseFloat(c[2]),
    l: parseFloat(c[3]),
    c: parseFloat(c[4]),
    v: parseFloat(c[5])
  }));
}

function calcBBWidth(candles, period) {
  if (candles.length < period) return null;
  const closes = candles.map(c => c.c);

  // Current BB width
  const sl = closes.slice(-period);
  const sma = sl.reduce((a,b)=>a+b,0)/period;
  const sigma = Math.sqrt(sl.reduce((a,b)=>a+Math.pow(b-sma,2),0)/period);
  const currWidth = (4 * sigma) / sma * 100; // BB width % of price

  // BB width N candles ago (to measure squeeze)
  const lookback = Math.min(period * 2, candles.length - period);
  const slOld = closes.slice(-period - lookback, -lookback);
  if (slOld.length < period) return null;
  const smaOld = slOld.reduce((a,b)=>a+b,0)/slOld.length;
  const sigmaOld = Math.sqrt(slOld.reduce((a,b)=>a+Math.pow(b-smaOld,2),0)/slOld.length);
  const oldWidth = (4 * sigmaOld) / smaOld * 100;

  const squeezeRatio = oldWidth > 0 ? ((oldWidth - currWidth) / oldWidth * 100) : 0;

  return {
    currWidth: currWidth.toFixed(2),
    squeezeRatio: squeezeRatio.toFixed(1), // % сужения относительно прошлого
    sma,
    upper: sma + 2*sigma,
    lower: sma - 2*sigma,
    price: closes[closes.length-1]
  };
}

function calcVolumeSpike(candles, lookback = 20) {
  if (candles.length < lookback + 1) return null;
  const vols = candles.slice(-lookback-1, -1).map(c => c.v);
  const avgVol = vols.reduce((a,b)=>a+b,0) / vols.length;
  const currVol = candles[candles.length-1].v;
  const ratio = avgVol > 0 ? currVol / avgVol : 0;
  return { ratio: ratio.toFixed(2), avgVol, currVol };
}

function calcBuyPressure(candles, n = 5) {
  // Buy pressure: ratio of bullish candles in last N
  const recent = candles.slice(-n);
  const bullish = recent.filter(c => c.c > c.o).length;
  // Also check if price moving toward upper BB
  const closes = candles.slice(-n).map(c => c.c);
  const rising = closes[closes.length-1] > closes[0];
  return { bullish, total: n, rising, ratio: (bullish/n*100).toFixed(0) };
}

async function analyzeCoin(symbol) {
  try {
    const candles = await fetchCandles(symbol);
    if (!candles || candles.length < 60) return null;

    const bbPeriod = +document.getElementById('p-bb').value || 20;
    const squeezePct = +document.getElementById('p-squeeze').value || 30;
    const volMult = +document.getElementById('p-vol').value || 2;
    const minSig = +document.getElementById('p-minsig').value || 2;

    const bb = calcBBWidth(candles, bbPeriod);
    const vol = calcVolumeSpike(candles, 20);
    const pressure = calcBuyPressure(candles, 5);

    if (!bb || !vol) return null;

    // Signal 1: BB Squeeze — канал сузился на X% относительно предыдущего
    const isSqueeze = parseFloat(bb.squeezeRatio) >= squeezePct;

    // Signal 2: Volume spike — объём в N раз выше среднего
    const isVolSpike = parseFloat(vol.ratio) >= volMult;

    // Signal 3: Buy pressure — цена растёт, бычьих свечей большинство
    const isBuyPressure = pressure.rising && pressure.bullish >= 3;

    // Signal 4: Price near upper BB (готовится к пробою)
    const nearUpperBB = bb.price > bb.sma && (bb.upper - bb.price) / (bb.upper - bb.sma) < 0.4;

    const signals = [isSqueeze, isVolSpike, isBuyPressure].filter(Boolean).length;
    const score = signals + (nearUpperBB ? 0.5 : 0);

    if (signals < minSig) return null;

    const change24 = ((bb.price - candles[0].c) / candles[0].c * 100);

    return {
      symbol, score, signals,
      isSqueeze, isVolSpike, isBuyPressure, nearUpperBB,
      bb, vol, pressure, change24,
      price: bb.price
    };
  } catch(e) { return null; }
}

function scoreClass(signals) {
  if (signals >= 3) return 's3';
  if (signals >= 2) return 's2';
  return 's1';
}
function scoreIcon(signals) {
  if (signals >= 3) return '🔥';
  if (signals >= 2) return '⚡';
  return '📶';
}
function scoreLabel(signals) {
  if (signals >= 3) return '🔥 3 сигнала';
  if (signals >= 2) return '⚡ 2 сигнала';
  return '1 сигнал';
}

function addAlert(r) {
  const list = document.getElementById('alerts-list');
  const empty = list.querySelector('.empty');
  if (empty) empty.remove();

  const t = new Date().toLocaleTimeString('ru-RU');
  const name = r.symbol.replace('USDT','');
  const sc = scoreClass(r.signals);
  const sign = r.change24 >= 0 ? '+' : '';

  const card = document.createElement('div');
  card.className = `alert-card ${sc}`;
  card.innerHTML = `
    <div class="card-top">
      <div class="card-icon ${sc}">${scoreIcon(r.signals)}</div>
      <div class="card-name">${name}/USDT <span style="font-size:11px;color:var(--${r.change24>=0?'green':'red'});font-weight:400">${sign}${r.change24.toFixed(1)}%</span></div>
      <div class="card-score ${sc}">${scoreLabel(r.signals)}</div>
      <div class="card-time">${t}</div>
    </div>
    <div class="signals">
      <div class="sig ${r.isSqueeze?'on squeeze':''}">
        <div class="sig-icon">📉</div>
        <div class="sig-label">Сжатие BB</div>
        <div class="sig-val">${r.bb.squeezeRatio}%</div>
      </div>
      <div class="sig ${r.isVolSpike?'on vol':''}">
        <div class="sig-icon">📊</div>
        <div class="sig-label">Объём</div>
        <div class="sig-val">×${r.vol.ratio}</div>
      </div>
      <div class="sig ${r.isBuyPressure?'on':''}">
        <div class="sig-icon">💪</div>
        <div class="sig-label">Давление</div>
        <div class="sig-val">${r.pressure.ratio}% bull</div>
      </div>
    </div>`;

  list.insertBefore(card, list.firstChild);
  while(list.children.length > 30) list.removeChild(list.lastChild);

  alertCount++;
  document.getElementById('st-alerts').textContent = alertCount;

  if (Notification.permission === 'granted') {
    const emoji = r.signals >= 3 ? '🔥' : '⚡';
    const n = new Notification(`${emoji} ${name} — перед пампом`, {
      body: `Сжатие BB ${r.bb.squeezeRatio}% · Объём ×${r.vol.ratio} · ${sign}${r.change24.toFixed(1)}% 24ч`,
      icon: '/icon-192.svg', badge: '/icon-192.svg', tag: r.symbol, renotify: true
    });
    setTimeout(() => n.close(), 10000);
  }
}

async function runScan() {
  scanBatch++;
  let coins;
  if (currentMode === 'fixed') {
    const topN = +document.getElementById('topn-select').value || 50;
    coins = FIXED_COINS.slice(0, topN);
  } else {
    log(`Загрузка топа (${currentMode})...`, 'warn');
    coins = await fetchTopCoins();
  }
  log(`Скан #${scanBatch} — ${coins.length} монет...`);
  document.getElementById('scan-info').textContent = `${coins.length} монет · ${currentMode}`;

  const BATCH = 8;
  const allResults = [];
  for (let i = 0; i < coins.length; i += BATCH) {
    if (!running) break;
    const batch = coins.slice(i, i+BATCH);
    const res = await Promise.all(batch.map(analyzeCoin));
    allResults.push(...res.filter(Boolean));
    const pct = Math.round((i+BATCH)/coins.length*100);
    document.getElementById('progress').style.width = Math.min(pct,100)+'%';
    if (i+BATCH < coins.length) await new Promise(r => setTimeout(r, 400));
  }
  document.getElementById('progress').style.width = '0%';

  // Sort by score desc
  allResults.sort((a,b) => b.score - a.score);

  const hotCount = allResults.filter(r => r.signals >= 3).length;
  document.getElementById('st-hot').textContent = hotCount;
  document.getElementById('st-total').textContent = coins.length;
  document.getElementById('st-scan').textContent = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});

  let newAlerts = 0;
  allResults.forEach(r => {
    const key = r.symbol + '_' + r.signals;
    if (!prevAlerted.has(key)) {
      addAlert(r);
      log(`${r.signals>=3?'🔥':'⚡'} ${r.symbol.replace('USDT','')} · сжатие ${r.bb.squeezeRatio}% · объём ×${r.vol.ratio}`, 'hi');
      prevAlerted.add(key);
      newAlerts++;
    }
  });

  // Clear old alerts on new scan cycle
  if (newAlerts === 0 && allResults.length === 0) {
    log('Сигналов нет — рынок спокойный');
  } else {
    log(`Найдено: ${allResults.length} сигналов, горячих: ${hotCount}`);
  }

  // Reset prevAlerted periodically (every 5 scans)
  if (scanBatch % 5 === 0) prevAlerted.clear();
}

function toggleScanner() {
  if (!running) {
    running = true;
    document.getElementById('dot').classList.add('active');
    document.getElementById('main-btn').textContent = '⏹ Остановить';
    document.getElementById('main-btn').className = 'btn btn-stop';
    log('Pump Scanner запущен');
    runScan();
    timer = setInterval(runScan, 120000); // 2 min
  } else {
    running = false;
    clearInterval(timer);
    document.getElementById('dot').classList.remove('active');
    document.getElementById('main-btn').textContent = '▶ Запустить';
    document.getElementById('main-btn').className = 'btn btn-start';
    document.getElementById('progress').style.width = '0%';
    log('Сканнер остановлен');
  }
}

async function requestNotify() {
  if (!('Notification' in window)) { alert('Уведомления не поддерживаются'); return; }
  const perm = await Notification.requestPermission();
  const btn = document.getElementById('notif-btn');
  if (perm === 'granted') {
    btn.textContent = '✅'; btn.className = 'btn btn-notify granted';
    new Notification('Pump Scanner', { body: 'Уведомления включены!', icon: '/icon-192.svg' });
  } else { btn.textContent = '🔕'; }
}

if ('Notification' in window && Notification.permission === 'granted') {
  document.getElementById('notif-btn').textContent = '✅';
  document.getElementById('notif-btn').className = 'btn btn-notify granted';
}
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
